name: CI/CD Python Package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: [published]

jobs:
  test:
    name: Testes (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Criar ambiente virtual
        run: python -m venv .venv

      - name: Instalar dependências
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install pytest build
          pip install -e .

      - name: Rodar testes
        run: |
          source .venv/bin/activate
          pytest

  build:
    name: Build pacote
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Criar ambiente virtual
        run: python -m venv .venv

      - name: Instalar dependências
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install build twine

      - name: Gerar pacote
        run: |
          source .venv/bin/activate
          python -m build

      - name: Verificar pacote
        run: |
          source .venv/bin/activate
          twine check dist/*

      - name: Upload artefatos
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publicar no PyPI
    needs: build
    runs-on: ubuntu-latest
    
    if: github.event_name == 'release'

    # ESSENCIAL para Trusted Publishing (OIDC) funcionar:
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Baixar artefatos
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publicar no PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        # Removido o 'with: password' pois agora usa o OIDC (Trusted Publishing)
